<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .box{
        display:flex;
        flex-wrap: wrap;
        padding: 24px;
        height: 300px;
        background-color: #008000; 
        gap: 10px;


    }
    .item{
          width: 50px;
          height: 50px;
          border: 2px solid black;
          flex-basis: 200px;
          /*flex-grow: 2;*/
          flex-shrink: 2;
    }
     
    .item-1{
             background-color: yellow;
    }

    .item-2{
            background-color: red;
    
    }
    .item-3{
            background-color: white;
    }
    


</style>
<body>

<div class="box">

    <div class="item item-1">Lorem ipsum dolor sit amet.</div>

    <div class="item item-2">red</div>

    <div class="item item-3">Lorem, ipsum.</div>

        


</div>
    
</body>
</html>
