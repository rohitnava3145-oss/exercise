<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>stats-preview-card-component-main</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article class="main-container">
      <div class="content">
        <h1>
          Get <span class="highlight">insights</span> that help your business
          grow.
        </h1>
        <p class="paragraph">
          Discover the benefit data analytics and make better decisions
          regarding revenue,customer experience and overall efficiency.
        </p>

        <main class="strength">
          <div>
            <span class="num">10k+</span>
            <p class="topic">companies</p>
          </div>
          <div>
            <span class="storage">314</span>
            <p class="stats">templates</p>
          </div>
          <div>
            <span class="visited-rate">12M+</span>
            <p class="visited">queries</p>
          </div>
        </main>
      </div>
      <picture>
        <source media="(500px)" srcset="./images/image-header-mobile.jpg" />
        <img
          class="team-profile"
          src="./images/image-header-desktop.jpg"
          alt="preview-card-component"
        />
      </picture>
    </article>
  </body>
</html>
