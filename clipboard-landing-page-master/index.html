<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>clipboard-landing-page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="root">
      <section id="hero_section" class="container">
        <img class="logo" src="./images/logo.svg" alt="logo-clipboard" />
        <div class="content-hero-content">
          <h1 class="base-heading">A history of everything you copy</h1>
          <p class="description">
            clipboard allows you to track and organize everything you copy.
            instantly access your clipboard on all your devices.
          </p>
          <div class="controls-button">
            <button id="cta_download_ios" class="cta-button">
              download for ios
            </button>
            <button id="cta_download_mac" class="cta-button">
              download for mac
            </button>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
