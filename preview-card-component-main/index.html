<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>preview-card-component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="main-container">
      <div class="front-profile">
        <img
          class="cube"
          src="./images/image-equilibrium.jpg"
          alt="image-equilibrium"
        />
        <h1 class="title-name">equilibrium#3429</h1>
        <p class="details">
          our equilibrium collection promotes balance and calm
        </p>
        <img
          class="icon-ethereum"
          src="./images/icon-ethereum.svg"
          alt="icon-ethereum"
        />
        <span class="number">0.041eth</span>
        <img src="./images/icon-clock.svg" alt="icon-clock" />
        <p class="day">3days left</p>
      </div>
      <article>
        <img
          src="./images/image-avatar.png"
          alt="avatar-image"
          class="profile-image"
        />
        <h2>creation of jules wyvern</h2>
      </article>
    </section>
  </body>
</html>
