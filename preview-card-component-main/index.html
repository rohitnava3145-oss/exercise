<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>preview-card-component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="main-container">
      <img
        class="box-image"
        src="./images/image-equilibrium.jpg"
        alt="image-equilibrium"
      />
      <div>
        <h1 class="title-name">equilibrium #3429</h1>
        <p class="details">
          Our Equilibrium collection promotes balance and calm.
        </p>
      </div>
      <main class="content-icon">
        <div class="name of eth">
          <img src="./images/icon-ethereum.svg" alt="icon-ethereum" />
          <span>0.041ETH</span>
        </div>
        <div class="status">
          <img class="clock" src="./images/icon-clock.svg" alt="" />
          <p class="count">3 days left</p>
        </div>
      </main>
      <div class="border"></div>

      <footer>
        <div class="character">
          <img
            class="profile-avatar"
            src="./images/image-avatar.png"
            alt="avatar-image"
          />
          <p class="arts">creation of</p>
          <h2 class="profile-name">jules wyvern</h2>
        </div>
      </footer>
    </section>
  </body>
</html>
